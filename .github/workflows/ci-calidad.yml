name: Inspección de Calidad JavaScript

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  calidad:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          # Requerido por Super-Linter para detectar cambios correctamente
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar sintaxis de demo.js
        run: node --check demo.js

      - name: Ejecutar pruebas (npm test)
        run: npm test

      - name: Ejecutar Super-Linter (JavaScript)
        uses: github/super-linter/slim@v6
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Revisar el repo completo
          VALIDATE_ALL_CODEBASE: true

          # Solo JavaScript
          VALIDATE_JAVASCRIPT_ES: true
          VALIDATE_TYPESCRIPT_ES: false

          # Formato (Prettier) para JS
          VALIDATE_JAVASCRIPT_PRETTIER: true

