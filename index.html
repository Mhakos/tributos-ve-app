<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tributos al Alcance · Diagnóstico</title>

    <style>
      :root {
        --slate-950: #020617; --slate-900: #0f172a; --slate-800: #1e293b;
        --slate-700: #334155; --slate-400: #94a3b8; --slate-300: #cbd5e1;
        --slate-200: #e2e8f0; --slate-100: #f1f5f9; --emerald-400: #34d399;
        --emerald-300: #6ee7b7; --rose-400: #fb7185; --fuchsia-300: #d946ef;
      }

      body {
        margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        background-color: var(--slate-950); color: var(--slate-100); min-height: 100vh;
      }

      .container { max-width: 48rem; margin: 0 auto; padding: 2.5rem 1rem; }
      
      /* Header & Badges */
      .badge {
        display: inline-flex; items-center; gap: 0.5rem; border-radius: 9999px;
        background-color: rgba(15, 23, 42, 0.7); padding: 0.25rem 0.75rem;
        font-size: 0.75rem; color: var(--slate-300); box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      }
      .dot { hieght: 0.5rem; width: 0.5rem; border-radius: 50%; background-color: var(--emerald-400); display: inline-block; margin-right: 4px; }
      
      h1 { font-size: 1.875rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; letter-spacing: -0.025em; }
      .desc { color: var(--slate-300); margin-bottom: 2rem; }

      /* Form Card */
      .card {
        background-color: rgba(15, 23, 42, 0.6); border-radius: 1rem; padding: 1.5rem;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px);
      }

      .grid { display: grid; gap: 1rem; }
      @media (min-width: 640px) { .grid-cols-2 { grid-template-columns: repeat(2, 1fr); } }

      .field-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem; }
      label { font-size: 0.875rem; font-weight: 500; color: var(--slate-200); }

      input, select {
        background-color: rgba(2, 6, 23, 0.6); border: 1px solid rgba(255, 255, 255, 0.1);
        color: white; border-radius: 0.75rem; padding: 0.75rem 1rem; font-size: 1rem; width: 100%; box-sizing: border-box;
      }
      input:focus, select:focus { outline: 2px solid var(--emerald-400); border-color: transparent; }
      .hint { font-size: 0.75rem; color: var(--slate-400); margin-top: 0.25rem; }

      /* Buttons */
      button, .btn-wa {
        cursor: pointer; display: inline-flex; justify-content: center; align-items: center;
        border-radius: 0.75rem; background-color: var(--emerald-400); padding: 0.75rem 1.25rem;
        font-weight: 500; color: var(--slate-950); border: none; transition: 0.2s; text-decoration: none;
      }
      button:hover, .btn-wa:hover { background-color: var(--emerald-300); }
      
      .status { font-size: 0.875rem; margin-top: 0.5rem; }
      .text-success { color: var(--emerald-300); }
      .text-error { color: var(--rose-400); }
      .hidden { display: none; }

      /* Resultado Styles */
      .res-card { margin-top: 1.5rem; padding: 1.5rem; background: rgba(15, 23, 42, 0.6); border-radius: 1rem; box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1); }
      .res-badge { padding: 0.25rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
      .vip-section { margin-top: 1.25rem; padding: 1rem; background: rgba(217, 70, 239, 0.1); border: 1px solid rgba(217, 70, 239, 0.3); border-radius: 0.75rem; }
    </style>
  </head>
  <body>
    <main class="container">
      <header>
        <div class="badge"><span class="dot"></span> Diagnóstico tributario</div>
        <h1>Test de Tributos</h1>
        <p class="desc">Completa el formulario para obtener tu diagnóstico de riesgo inmediato.</p>
      </header>

      <section id="tributos-form-container" class="card">
        <form id="tributos-form">
          <div class="grid grid-cols-2">
            <div class="field-group">
              <label>Nombre</label>
              <input name="nombre" type="text" required placeholder="Ej: María González" />
            </div>
            <div class="field-group">
              <label>Teléfono</label>
              <input name="telefono" type="tel" required placeholder="0412 5551234" />
              <p class="hint">Formatos: +58 o 04xx.</p>
            </div>
          </div>

          <div class="field-group">
            <label>RIF (obligatorio)</label>
            <input name="rif" type="text" required placeholder="V-12345678-1" />
            <p class="hint">Ejemplo: J-12345678-9</p>
          </div>

          <div class="grid grid-cols-2">
            <div class="field-group">
              <label>Tipo de sujeto</label>
              <select name="tipoSujeto" required>
                <option value="" selected disabled>Seleccione…</option>
                <option value="persona_natural">Persona natural</option>
                <option value="pyme">Pyme</option>
                <option value="contribuyente_especial">Contribuyente especial</option>
              </select>
            </div>
            <div class="field-group">
              <label>Ubicación</label>
              <select name="ubicacion" required>
                <option value="" selected disabled>Seleccione…</option>
                <option value="caracas">Caracas</option>
                <option value="valencia">Valencia</option>
                <option value="maracaibo">Maracaibo</option>
                <option value="resto_pais">Resto del país</option>
              </select>
            </div>
          </div>

          <div class="field-group">
            <label>Ingresos mensuales (USD)</label>
            <input name="ingresosMensuales" type="number" min="0" step="1" required placeholder="Ej: 5000" />
          </div>

          <div class="field-group">
            <label>Motivo de consulta</label>
            <select name="dolorPrincipal" required>
              <option value="" selected disabled>Seleccione…</option>
              <option value="multas_seniat">Gestión de multas y sanciones</option>
              <option value="manejo_igtf">Gestión de IGTF</option>
              <option value="retenciones_iva_islr">Retenciones de IVA/ISLR</option>
              <option value="auditoria_preventiva">Auditoría preventiva</option>
            </select>
          </div>

          <div class="grid grid-cols-2">
            <div class="field-group">
              <label>¿Máquinas fiscales actualizadas?</label>
              <select name="maquinasFiscalesActualizadas" required>
                <option value="" selected disabled>Seleccione…</option>
                <option value="true">Sí</option>
                <option value="false">No</option>
              </select>
            </div>
            <div class="field-group">
              <label>¿Tiene fiscalización activa?</label>
              <select name="fiscalizacionActiva" required>
                <option value="" selected disabled>Seleccione…</option>
                <option value="true">Sí</option>
                <option value="false">No</option>
              </select>
            </div>
          </div>

          <div style="display: flex; flex-direction: column; gap: 1rem; align-items: flex-start; margin-top: 1rem;">
            <button type="submit">Terminar test</button>
            <p id="form-status" class="status" aria-live="polite"></p>
          </div>
        </form>
      </section>

      <script>
        (function () {
          const TIPO_SUJETO = { PERSONA_NATURAL: 'persona_natural', PYME: 'pyme', CONTRIBUYENTE_ESPECIAL: 'contribuyente_especial' };
          const UMBRAL_INGRESOS_VIP = 5000;
          const RIF_LETRAS_VALIDAS = ['V', 'E', 'J', 'P', 'G'];
          const RIF_VALORES_LETRA = { V: 4, E: 8, J: 12, P: 16, G: 20 };
          const RIF_FACTORES = [0, 3, 2, 7, 6, 5, 4, 3, 2];

          function formatearRIF(rif) {
            const limpio = String(rif || '').replace(/\s|-/g, '').toUpperCase();
            if (limpio.length < 10) return limpio;
            return `${limpio[0]}-${limpio.slice(1, 9)}-${limpio.slice(-1)}`;
          }

          function validarRIF(rif) {
            if (!rif || typeof rif !== 'string') return { valido: false, mensaje: 'RIF inválido.' };
            const normalizado = rif.replace(/\s|-/g, '').toUpperCase();
            if (normalizado.length < 9 || normalizado.length > 10) return { valido: false, mensaje: 'RIF inválido.' };
            const letra = normalizado[0];
            if (!RIF_LETRAS_VALIDAS.includes(letra)) return { valido: false, mensaje: 'Letra inicial inválida.' };
            const digitos = normalizado.slice(1, 9);
            if (!/^\d{8}$/.test(digitos)) return { valido: false, mensaje: 'Debe contener 8 números.' };
            let suma = RIF_VALORES_LETRA[letra];
            for (let i = 0; i < 8; i++) suma += RIF_FACTORES[i + 1] * parseInt(digitos[i], 10);
            let dV = 11 - (suma % 11);
            if (dV >= 10) dV = 0;
            const rifEsperado = `${letra}${digitos}${dV}`;
            if (normalizado.length === 10 && normalizado !== rifEsperado) return { valido: false, mensaje: `Inválido. Ejemplo: ${formatearRIF(rifEsperado)}` };
            return { valido: true, rifFormateado: formatearRIF(rifEsperado) };
          }

          function normalizarTelefonoVE(input) {
            const digits = String(input || '').replace(/\D/g, '');
            if (digits.length === 12 && digits.startsWith('58')) return `+${digits}`;
            if (digits.length === 11 && digits.startsWith('04')) return `+58${digits.slice(1)}`;
            return null;
          }

          function procesarCuestionario(resp) {
            let score = 0; const factores = [];
            const ingresos = Number(resp.ingresosMensuales);

            if (resp.tipoSujeto === TIPO_SUJETO.CONTRIBUYENTE_ESPECIAL) { score += 35; factores.push('Contribuyente especial'); }
            else if (resp.tipoSujeto === TIPO_SUJETO.PYME) { score += 20; factores.push('Pyme'); }
            
            if (ingresos >= 5000) { score += 20; factores.push('Ingresos altos'); }
            if (resp.maquinasFiscalesActualizadas === false) { score += 25; factores.push('Máquinas no actualizadas'); }
            if (resp.fiscalizacionActiva === true) { score += 40; factores.push('Fiscalización activa'); }

            const puntaje = Math.min(100, score);
            let nivel = puntaje >= 70 ? 'crítico' : puntaje >= 50 ? 'alto' : puntaje >= 30 ? 'medio' : 'bajo';
            return { puntaje, nivel, factores, respuestas: { ...resp, ingresosMensuales: ingresos } };
          }

          const form = document.getElementById('tributos-form');
          const statusEl = document.getElementById('form-status');
          const container = document.getElementById('tributos-form-container');

          function setStatus(text, kind) {
            statusEl.className = `status ${kind === 'error' ? 'text-error' : kind === 'success' ? 'text-success' : ''}`;
            statusEl.textContent = text || '';
          }

          form.addEventListener('submit', (e) => {
            e.preventDefault();
            const telNormalizado = normalizarTelefonoVE(form.elements.telefono.value);
            const rifVal = validarRIF(form.elements.rif.value);

            if (!telNormalizado || !rifVal.valido) {
              setStatus(rifVal.mensaje || 'Revise teléfono o RIF.', 'error');
              return;
            }

            const diag = procesarCuestionario({
              tipoSujeto: form.elements.tipoSujeto.value,
              ubicacion: form.elements.ubicacion.value,
              ingresosMensuales: form.elements.ingresosMensuales.value,
              dolorPrincipal: form.elements.dolorPrincipal.value,
              maquinasFiscalesActualizadas: form.elements.maquinasFiscalesActualizadas.value === 'true',
              fiscalizacionActiva: form.elements.fiscalizacionActiva.value === 'true'
            });

            const esVip = diag.respuestas.tipoSujeto === TIPO_SUJETO.CONTRIBUYENTE_ESPECIAL || diag.respuestas.ingresosMensuales > UMBRAL_INGRESOS_VIP;
            const badgeCls = diag.nivel === 'crítico' ? 'bg-rose-400' : diag.nivel === 'alto' ? 'bg-amber-300' : 'bg-emerald-300';
            const msgVip = encodeURIComponent(`Hola Tributos a tu Alcance, mi RIF es ${rifVal.rifFormateado} y mi diagnóstico es ${diag.nivel}. Necesito asesoría.`);

            // Inyectar Resultado
            const resDiv = document.createElement('div');
            resDiv.className = 'res-card';
            resDiv.innerHTML = `
              <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="margin:0; font-size:1.25rem;">Resultado</h2>
                <span class="res-badge ${badgeCls}" style="color:#020617">${diag.nivel}</span>
              </div>
              <p style="font-size:0.875rem; color:var(--slate-300);">Puntaje de riesgo: <strong>${diag.puntaje}</strong></p>
              <ul style="font-size:0.875rem; color:var(--slate-400);">${diag.factores.map(f => `<li>${f}</li>`).join('')}</ul>
              ${esVip ? `
                <div class="vip-section">
                  <p style="margin:0 0 1rem 0; font-weight:600; color:var(--fuchsia-300);">Atención Prioritaria WhatsApp:</p>
                  <div style="display:grid; gap:0.5rem; grid-template-columns:1fr 1fr;">
                    <a href="https://wa.me/584122089575?text=${msgVip}" class="btn-wa">Asesor 1</a>
                    <a href="https://wa.me/584265112653?text=${msgVip}" class="btn-wa">Asesor 2</a>
                  </div>
                </div>
              ` : ''}
            `;
            container.innerHTML = '';
            container.appendChild(resDiv);
          });
        })();
      </script>
    </main>
  </body>
</html>
