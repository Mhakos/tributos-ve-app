<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Tributario Profesional</title>
    <style>
        :root {
            --bg-color: #020617; --accent-color: #00f3ff; --text-color: #f8fafc;
            --error-color: #ef4444; --success-color: #22c55e;
            --input-bg: rgba(15, 23, 42, 0.8);
        }
        body {
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            display: flex; justify-content: center; align-items: flex-start; min-height: 100vh;
        }
        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        .card { 
            background: var(--input-bg); padding: 30px; border-radius: 16px;
            border: 1px solid rgba(0, 243, 255, 0.2); box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
            transition: opacity 0.4s ease;
        }
        h1 { color: var(--accent-color); text-align: center; font-size: 24px; margin-bottom: 10px; }
        p.desc { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 25px; }
        
        .field-group { margin-bottom: 20px; position: relative; }
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; }
        input {
            width: 100%; padding: 12px; background: var(--bg-color); border: 1px solid #334155;
            border-radius: 8px; color: white; box-sizing: border-box; font-size: 16px;
        }
        input:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }
        .error-txt { color: var(--error-color); font-size: 12px; margin-top: 5px; display: none; }
        
        button {
            width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold;
            cursor: pointer; transition: 0.3s; font-size: 16px; margin-bottom: 10px;
        }
        #btn-iniciar { background: var(--accent-color); color: #020617; }
        #btn-iniciar:disabled { background: #1e293b; color: #64748b; cursor: not-allowed; }
        
        .pregunta-card { text-align: center; }
        .btn-opcion { background: #1e293b; color: white; border: 1px solid #334155; }
        .btn-opcion:hover { border-color: var(--accent-color); background: rgba(0, 243, 255, 0.05); }
        
        .hidden { display: none; opacity: 0; }
        .visible { display: block; opacity: 1; }

        .resultado-box { text-align: center; padding: 20px; border-radius: 12px; background: rgba(255,255,255,0.03); }
        .nivel-riesgo { font-size: 28px; font-weight: 800; margin: 15px 0; text-transform: uppercase; }
        .btn-wa { background: var(--success-color); color: white; text-decoration: none; display: block; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .btn-restart { background: transparent; color: #94a3b8; border: 1px solid #334155; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="fase1" class="card visible">
            <h1>Diagnóstico Tributario</h1>
            <p class="desc">Complete los datos para iniciar la evaluación preventiva.</p>
            
            <div class="field-group">
                <label>Empresa / Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Ej: Inversiones ABC, C.A.">
                <div id="err-nombre" class="error-txt">El nombre de la empresa es obligatorio.</div>
            </div>

            <div class="field-group">
                <label>RIF (Formato: J-12345678-0)</label>
                <input type="text" id="rif" placeholder="J-12345678-0">
                <div id="err-rif" class="error-txt">Formato de RIF incorrecto (Ej: J-12345678-0).</div>
            </div>

            <div class="field-group">
                <label>Correo Electrónico</label>
                <input type="email" id="correo" placeholder="gerencia@empresa.com">
                <div id="err-correo" class="error-txt">Ingrese un correo electrónico válido.</div>
            </div>

            <button id="btn-iniciar" disabled>INICIAR DIAGNÓSTICO</button>
        </div>

        <div id="fase2" class="card hidden">
            <div id="pregunta-cont" class="pregunta-card">
                <p id="progreso" style="color: var(--accent-color); font-size: 12px; font-weight: bold;"></p>
                <h2 id="texto-pregunta" style="font-size: 20px; margin: 20px 0;"></h2>
                <button class="btn-opcion" onclick="responder(0)">SÍ</button>
                <button class="btn-opcion" onclick="responder(20)">NO</button>
                <button class="btn-opcion" onclick="responder(20)">NO SÉ</button>
            </div>
        </div>

        <div id="fase3" class="card hidden">
            <div class="resultado-box">
                <p>Nivel de Riesgo Detectado:</p>
                <div id="nivel-txt" class="nivel-riesgo"></div>
                <p id="desc-riesgo" style="font-size: 14px; color: #cbd5e1;"></p>
                <button id="btn-whatsapp" class="btn-wa">SOLICITAR ASESORÍA ESPECIALIZADA</button>
                <button onclick="location.reload()" class="btn-restart">Finalizar y volver al inicio</button>
            </div>
        </div>
    </div>

    <script>
        const preguntas = [
            "¿Sabes exactamente cuánto deberías estar pagando de impuestos este mes?",
            "Si el SENIAT te fiscalizara mañana, ¿podrías presentar todos tus documentos en orden?",
            "¿Tu negocio recibe o realiza pagos en divisas o plataformas (Zelle, Binance, etc.)?",
            "¿Cuándo fue la última vez que un especialista externo revisó tu situación tributaria?",
            "¿Tienes trabajadores y sabes si estás cumpliendo con el IVSS y el INCES?"
        ];

        let preguntaActual = 0;
        let puntajeTotal = 0;
        const inputs = {
            nombre: document.getElementById('nombre'),
            rif: document.getElementById('rif'),
            correo: document.getElementById('correo')
        };

        // Validaciones en tiempo real
        function validar() {
            const vNombre = inputs.nombre.value.trim().length > 2;
            const vRif = /^[VEJG]-?\d{7,9}-?\d$/.test(inputs.rif.value.trim().toUpperCase());
            const vCorreo = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(inputs.correo.value.trim());

            document.getElementById('err-nombre').style.display = (inputs.nombre.value && !vNombre) ? 'block' : 'none';
            document.getElementById('err-rif').style.display = (inputs.rif.value && !vRif) ? 'block' : 'none';
            document.getElementById('err-correo').style.display = (inputs.correo.value && !vCorreo) ? 'block' : 'none';

            document.getElementById('btn-iniciar').disabled = !(vNombre && vRif && vCorreo);
        }

        Object.values(inputs).forEach(input => input.addEventListener('input', validar));

        document.getElementById('btn-iniciar').addEventListener('click', () => {
            document.getElementById('fase1').classList.replace('visible', 'hidden');
            setTimeout(() => {
                document.getElementById('fase2').classList.replace('hidden', 'visible');
                mostrarPregunta();
            }, 400);
        });

        function mostrarPregunta() {
            document.getElementById('progreso').innerText = `PREGUNTA ${preguntaActual + 1} DE 5`;
            document.getElementById('texto-pregunta').innerText = preguntas[preguntaActual];
        }

        function responder(puntos) {
            puntajeTotal += puntos;
            preguntaActual++;
            if (preguntaActual < preguntas.length) {
                mostrarPregunta();
            } else {
                mostrarResultado();
            }
        }

        function mostrarResultado() {
            document.getElementById('fase2').classList.replace('visible', 'hidden');
            let riesgo = "BAJO";
            let color = "#22c55e";
            let desc = "Su situación parece estar bajo control, pero una revisión preventiva nunca está de más.";

            if (puntajeTotal >= 80) { 
                riesgo = "CRÍTICO"; color = "#ef4444"; 
                desc = "Se han detectado inconsistencias graves que requieren atención inmediata para evitar sanciones.";
            }
            else if (puntajeTotal >= 40) { 
                riesgo = "MODERADO"; color = "#f59e0b"; 
                desc = "Existen vacíos de información que podrían generar multas en una fiscalización.";
            }

            const nivelTxt = document.getElementById('nivel-txt');
            nivelTxt.innerText = riesgo;
            nivelTxt.style.color = color;
            document.getElementById('desc-riesgo').innerText = desc;
            
            setTimeout(() => document.getElementById('fase3').classList.replace('hidden', 'visible'), 400);
        }

        document.getElementById('btn-whatsapp').addEventListener('click', () => {
            const asesores = ['584265112653', '584122089575'];
            const asesor = asesores[Math.floor(Math.random() * asesores.length)];
            const nom = inputs.nombre.value;
            const id = inputs.rif.value.toUpperCase();
            const rsg = document.getElementById('nivel-txt').innerText;
            const mail = inputs.correo.value;
            
            const msj = `Hola! Mi nombre es ${nom}, RIF ${id}. Mi resultado en el diagnóstico es RIESGO ${rsg}. Mi correo es ${mail}. Necesito asesoría especializada urgente.`;
            window.open(`https://wa.me/${asesor}?text=${encodeURIComponent(msj)}`, '_blank');
        });
    </script>
</body>
</html>
