<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tributos Venezuela - App</title>
    <style>
        :root {
            --bg: #020617; --neon: #00f3ff; --card: rgba(15, 23, 42, 0.95);
            --text: #f8fafc; --error: #ef4444; --success: #22c55e;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; }
        .card { 
            background: var(--card); padding: 22px; border-radius: 18px;
            border: 1px solid rgba(0, 243, 255, 0.2); margin-bottom: 20px;
        }
        h2 { color: var(--neon); text-align: center; font-size: 18px; margin-top: 0; text-transform: uppercase; }
        
        /* Estilos de Campos e Inputs */
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 12px; margin-bottom: 5px; color: #94a3b8; }
        input {
            width: 100%; padding: 12px; background: #000; border: 1px solid #334155;
            border-radius: 10px; color: white; box-sizing: border-box; font-size: 14px;
        }
        /* Alertas Rojas de Validación */
        input.invalid { border: 2px solid var(--error) !important; background: rgba(239, 68, 68, 0.1); }
        .err-msg { color: var(--error); font-size: 10px; margin-top: 4px; display: none; font-weight: bold; }

        /* Calculadora (Lógica Excel) */
        .check-item { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; font-size: 13px; cursor: pointer; }
        .check-item input { width: auto; margin-top: 3px; }
        .res-box { text-align: center; padding: 15px; border: 1px dashed var(--error); border-radius: 12px; margin-top: 15px; }

        /* Botones */
        button { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .btn-main { background: var(--neon); color: #020617; }
        .btn-main:disabled { background: #1e293b; color: #64748b; cursor: not-allowed; }
        .btn-wa { background: var(--success); color: white; text-decoration: none; display: block; text-align: center; padding: 14px; border-radius: 10px; margin-top: 15px; }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">

        <div class="card">
            <h2>Calculadora de Ilícitos</h2>
            <div id="ilic-list">
                <label class="check-item"><input type="checkbox" class="ilic" value="100"> Rif desactualizado (100)</label>
                <label class="check-item"><input type="checkbox" class="ilic" value="150"> No emitir facturas (150)</label>
                <label class="check-item"><input type="checkbox" class="ilic" value="150"> No tener libros (150)</label>
                <label class="check-item"><input type="checkbox" class="ilic" value="150"> No presentar declaración (150)</label>
                <label class="check-item"><input type="checkbox" class="ilic" value="100"> Declaración extemporánea (100)</label>
            </div>
            <div class="field" style="margin-top:15px;">
                <label>Valor del TCMV (Bs.):</label>
                <input type="number" id="v-tcmv" placeholder="Ingrese el valor actual" oninput="runCalc()">
            </div>
            <div class="res-box">
                <div id="t-tcmv" style="font-size:16px; font-weight:bold; color:var(--neon);">0 TCMV</div>
                <div id="t-bs" style="font-size:22px; font-weight:bold; color:var(--error);">Bs. 0,00</div>
            </div>
        </div>

        <div id="d1" class="card">
            <h2>Diagnóstico de Riesgo</h2>
            <div class="field">
                <label>Empresa / Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Nombre de la empresa">
                <div id="m-nom" class="err-msg">Nombre obligatorio.</div>
            </div>
            <div class="field">
                <label>RIF (Ej: J-12345678-0)</label>
                <input type="text" id="rif" placeholder="V-15160842-2">
                <div id="m-rif" class="err-msg">RIF inválido (Letra-Números-Dígito).</div>
            </div>
            <div class="field">
                <label>Correo Electrónico</label>
                <input type="email" id="correo" placeholder="correo@empresa.com">
                <div id="m-cor" class="err-msg">Correo inválido.</div>
            </div>
            <button id="btn-iniciar" class="btn-main" disabled onclick="startQ()">INICIAR EVALUACIÓN</button>
        </div>

        <div id="d2" class="card hidden">
            <h2 id="q-text" style="font-size:16px;"></h2>
            <button class="btn-main" style="background:#1e293b; color:white; margin-bottom:10px;" onclick="ans(0)">SÍ</button>
            <button class="btn-main" style="background:#1e293b; color:white; margin-bottom:10px;" onclick="ans(20)">NO</button>
            <button class="btn-main" style="background:#1e293b; color:white;" onclick="ans(20)">NO SÉ</button>
        </div>

        <div id="d3" class="card hidden">
            <h2 id="r-nivel"></h2>
            <p id="r-desc" style="text-align:center; font-size:13px; color:#94a3b8;"></p>
            <a id="wa-link" href="#" target="_blank" class="btn-wa">SOLICITAR ASESORÍA</a>
            <button onclick="location.reload()" style="background:transparent; color:#64748b; font-size:12px; margin-top:10px; text-decoration:underline;">Reiniciar Todo</button>
        </div>

    </div>

    <script>
        // Lógica de Concurrencia de tu Excel (Máximo + 50% del resto)
        function runCalc() {
            const checks = document.querySelectorAll('.ilic:checked');
            let vals = Array.from(checks).map(c => parseFloat(c.value));
            let totalTCMV = 0;

            if (vals.length > 0) {
                let max = Math.max(...vals);
                let resto = vals.reduce((a, b) => a + b, 0) - max;
                totalTCMV = max + (resto / 2);
            }

            const valTCMV = document.getElementById('v-tcmv').value || 0;
            document.getElementById('t-tcmv').innerText = `${totalTCMV} TCMV`;
            document.getElementById('t-bs').innerText = `Bs. ${(totalTCMV * valTCMV).toLocaleString('es-VE', {minimumFractionDigits: 2})}`;
        }
        document.querySelectorAll('.ilic').forEach(c => c.addEventListener('change', runCalc));

        // Validaciones en tiempo real con alertas rojas
        const ins = { n: document.getElementById('nombre'), r: document.getElementById('rif'), c: document.getElementById('correo') };
        function validate() {
            const vN = ins.n.value.trim().length >= 3;
            const vR = /^[VEJG]-?\d{7,9}-?\d$/.test(ins.r.value.trim().toUpperCase());
            const vC = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(ins.c.value.trim());

            toggle(ins.n, 'm-nom', vN);
            toggle(ins.r, 'm-rif', vR);
            toggle(ins.c, 'm-cor', vC);

            document.getElementById('btn-iniciar').disabled = !(vN && vR && vC);
        }
        function toggle(el, id, ok) {
            if (el.value === "") { el.classList.remove('invalid'); document.getElementById(id).style.display='none'; }
            else if (!ok) { el.classList.add('invalid'); document.getElementById(id).style.display='block'; }
            else { el.classList.remove('invalid'); document.getElementById(id).style.display='none'; }
        }
        Object.values(ins).forEach(i => i.addEventListener('input', validate));

        // Preguntas de Impacto Originales
        const qs = [
            "¿Sabes exactamente cuánto deberías estar pagando de impuestos este mes?",
            "Si el SENIAT te fiscalizara mañana, ¿podrías presentar todo en orden?",
            "¿Tu negocio recibe o realiza pagos en divisas o Zelle/Binance?",
            "¿Cuándo fue la última vez que un especialista externo revisó tu situación?",
            "¿Tienes trabajadores y sabes si cumples con el IVSS e INCES?"
        ];
        let cur = 0, pts = 0;

        function startQ() { document.getElementById('d1').classList.add('hidden'); document.getElementById('d2').classList.remove('hidden'); showQ(); }
        function showQ() { document.getElementById('q-text').innerText = qs[cur]; }
        function ans(p) { pts += p; cur++; if(cur < qs.length) showQ(); else res(); }

        function res() {
            document.getElementById('d2').classList.add('hidden');
            document.getElementById('d3').classList.remove('hidden');
            let n = "BAJO", c = "#22c55e", d = "Se recomienda una auditoría preventiva semestral.";
            if(pts >= 80) { n = "CRÍTICO"; c = "#ef4444"; d = "Riesgo alto de clausura y multas severas. Contacte a un asesor."; }
            else if(pts >= 40) { n = "MODERADO"; c = "#f59e0b"; d = "Existen vacíos que pueden causar sanciones en una inspección."; }
            
            const tag = document.getElementById('r-nivel'); tag.innerText = `RIESGO ${n}`; tag.style.color = c;
            document.getElementById('r-desc').innerText = d;

            const as = ['584265112653', '584122089575'];
            const a = as[Math.floor(Math.random() * as.length)];
            const m = `Hola! Soy ${ins.n.value}, RIF ${ins.r.value}. Mi riesgo es ${n}. Necesito ayuda experta.`;
            document.getElementById('wa-link').href = `https://api.whatsapp.com/send?phone=${a}&text=${encodeURIComponent(m)}`;
        }
    </script>
</body>
</html>
