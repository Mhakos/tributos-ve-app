<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Ilícitos y Riesgo</title>
    <style>
        :root {
            --bg: #020617; --neon: #00f3ff; --card: rgba(15, 23, 42, 0.9);
            --text: #f8fafc; --error: #ef4444; --success: #22c55e;
        }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid rgba(0, 243, 255, 0.2); }
        h1 { color: var(--neon); text-align: center; font-size: 22px; }
        
        .field-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #334155; border-radius: 8px; color: white; box-sizing: border-box; }
        
        button { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-main { background: var(--neon); color: #020617; }
        .btn-main:disabled { background: #1e293b; color: #64748b; }
        .btn-opt { background: #1e293b; color: white; border: 1px solid #334155; }

        /* Estilos Calculadora */
        .calc-res { background: rgba(239, 68, 68, 0.1); border: 1px dashed var(--error); padding: 15px; border-radius: 12px; margin: 20px 0; text-align: center; }
        .monto { font-size: 28px; font-weight: 800; color: var(--error); display: block; margin: 10px 0; }
        
        .hidden { display: none; }
        .btn-wa { background: var(--success); color: white; text-decoration: none; display: block; text-align: center; padding: 15px; border-radius: 8px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="f1" class="card">
            <h1>Diagnóstico Tributario</h1>
            <div class="field-group">
                <label>Empresa / Nombre</label>
                <input type="text" id="nombre" placeholder="Ej: Corporación ABC">
            </div>
            <div class="field-group">
                <label>RIF (Ej: J-12345678-0)</label>
                <input type="text" id="rif" placeholder="V-00000000-0">
            </div>
            <div class="field-group">
                <label>Correo Electrónico</label>
                <input type="email" id="correo" placeholder="gerencia@correo.com">
            </div>
            <button id="btn-iniciar" class="btn-main" onclick="irPreguntas()">INICIAR EVALUACIÓN</button>
        </div>

        <div id="f2" class="card hidden">
            <h2 id="q-text" style="font-size: 18px; text-align: center;"></h2>
            <button class="btn-opt" onclick="sig(0)">SÍ, TODO AL DÍA</button>
            <button class="btn-opt" onclick="sig(20)">NO / TENGO DUDAS</button>
            <button class="btn-opt" onclick="sig(20)">NO LO SÉ</button>
        </div>

        <div id="f3" class="card hidden">
            <h2 style="text-align:center;">Resultado: <span id="riesgo"></span></h2>
            
            <div class="calc-res">
                <span style="font-size: 12px; color: #fca5a5;">MULTA ESTIMADA POR ILÍCITOS FORMALES</span>
                <span id="monto-bs" class="monto">Bs. 0,00</span>
                <span style="font-size: 11px; color: #94a3b8;">Basado en Valor UT: Bs. 9,00</span>
            </div>

            <p id="desc" style="font-size: 14px; text-align: center; color: #cbd5e1;"></p>
            
            <a id="wa" href="#" class="btn-wa">SOLICITAR ASESORÍA URGENTE</a>
            <button onclick="location.reload()" style="background:transparent; color:#64748b; font-size:12px;">Reiniciar evaluación</button>
        </div>
    </div>

    <script>
        const qs = [
            "¿Lleva sus Libros de Compra y Venta según la ley?",
            "¿Emite facturas legales o usa máquina fiscal?",
            "¿Declara el IVA y el ISLR a tiempo?",
            "¿Su RIF está vigente y actualizado?",
            "¿Maneja pagos en divisas y los reporta (IGTF)?"
        ];
        let cur = 0, pts = 0;
        const UT = 9.00;

        function irPreguntas() {
            document.getElementById('f1').classList.add('hidden');
            document.getElementById('f2').classList.remove('hidden');
            nextQ();
        }

        function nextQ() {
            document.getElementById('q-text').innerText = qs[cur];
        }

        function sig(p) {
            pts += p;
            cur++;
            if(cur < qs.length) nextQ();
            else verResultados();
        }

        function verResultados() {
            document.getElementById('f2').classList.add('hidden');
            document.getElementById('f3').classList.remove('hidden');
            
            let r = "BAJO", uts = 50, col = "#22c55e";
            if(pts >= 80) { r = "CRÍTICO"; uts = 500; col = "#ef4444"; }
            else if(pts >= 40) { r = "MODERADO"; uts = 150; col = "#f59e0b"; }

            const m = uts * UT;
            document.getElementById('riesgo').innerText = r;
            document.getElementById('riesgo').style.color = col;
            document.getElementById('monto-bs').innerText = `Bs. ${m.toLocaleString('es-VE', {minimumFractionDigits: 2})}`;
            document.getElementById('desc').innerText = `Se han detectado posibles fallas que suman ${uts} Unidades Tributarias en multas estimadas.`;
            
            // Link WhatsApp
            const n = document.getElementById('nombre').value;
            const msj = `Hola! Soy ${n}. Mi diagnóstico dio Riesgo ${r} con una multa estimada de Bs. ${m}. Necesito asesoría especializada.`;
            document.getElementById('wa').href = `https://wa.me/584265112653?text=${encodeURIComponent(msj)}`;
        }
    </script>
</body>
</html>
