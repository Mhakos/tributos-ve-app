<div id="form-screen" class="card">
    <h2 style="margin-top: 0;">Diagnóstico Tributario</h2>
    <p class="desc">Complete los datos para iniciar la evaluación preventiva.</p>
    
    <div class="field-group">
        <label for="name">Empresa / Nombre Completo</label>
        <input type="text" id="name" placeholder="Ej: Corporación Ejemplo C.A.">
        <div id="name-error" class="error-message">El nombre es obligatorio.</div>
    </div>

    <div class="field-group">
        <label for="rif">RIF (Formato: J-00000000-0)</label>
        <input type="text" id="rif" placeholder="V-15160842-2">
        <div id="rif-error" class="error-message">Formato de RIF incorrecto (Ej: J-12345678-0).</div>
    </div>

    <div class="field-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" placeholder="mhakospavone22@gmail.com">
        <div id="email-error" class="error-message">Ingrese un correo electrónico válido.</div>
    </div>

    <button id="submit" disabled>INICIAR DIAGNÓSTICO</button>
</div>

<div id="results-screen" class="hidden">
    <div id="diagnostico-texto"></div>
    <button id="wa-button" class="btn-wa">SOLICITAR ASESORÍA</button>
    <button id="return-button">Finalizar y volver al inicio</button>
</div>
