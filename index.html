<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión Tributaria - Mhakos</title>
    <style>
        :root {
            --bg: #020617; --neon: #00f3ff; --card-bg: rgba(15, 23, 42, 0.95);
            --text: #f8fafc; --error: #ef4444; --success: #22c55e;
        }
        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background-color: var(--bg); color: var(--text);
            display: flex; justify-content: center; padding: 20px;
        }
        .container { width: 100%; max-width: 500px; }
        .card { 
            background: var(--card-bg); padding: 25px; border-radius: 20px;
            border: 1px solid rgba(0, 243, 255, 0.3); box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
        }
        h1 { color: var(--neon); text-align: center; font-size: 22px; margin-bottom: 20px; }
        
        /* Formulario */
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 13px; margin-bottom: 6px; color: #94a3b8; }
        input {
            width: 100%; padding: 12px; background: #000; border: 1px solid #334155;
            border-radius: 10px; color: white; box-sizing: border-box; font-size: 15px;
        }
        .err { color: var(--error); font-size: 11px; margin-top: 4px; display: none; }
        
        /* Botones */
        button, .btn-link {
            width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 15px; text-align: center;
        }
        .btn-main { background: var(--neon); color: #020617; }
        .btn-main:disabled { background: #1e293b; color: #64748b; cursor: not-allowed; }
        .btn-opt { background: #1e293b; color: white; border: 1px solid #334155; }
        .btn-opt:hover { border-color: var(--neon); }
        
        /* Calculadora Estilo Original */
        .calc-display {
            background: rgba(0, 0, 0, 0.4); padding: 20px; border-radius: 12px;
            margin: 20px 0; border: 1px dashed var(--neon); text-align: center;
        }
        .multa-monto { font-size: 32px; font-weight: 800; color: var(--error); display: block; }
        .ut-info { font-size: 12px; color: #94a3b8; margin-top: 5px; }

        .hidden { display: none; }
        .visible { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-wa { background: var(--success); color: white; text-decoration: none; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div id="fase1" class="card visible">
            <h1>Diagnóstico Tributario</h1>
            <div class="field">
                <label>Empresa / Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Ej: Corporación ABC, C.A.">
                <div id="e-nom" class="err">Nombre obligatorio.</div>
            </div>
            <div class="field">
                <label>RIF (Ej: J-12345678-0)</label>
                <input type="text" id="rif" placeholder="J-00000000-0">
                <div id="e-rif" class="err">Formato de RIF inválido.</div>
            </div>
            <div class="field">
                <label>Correo Electrónico</label>
                <input type="email" id="correo" placeholder="gerencia@empresa.com">
                <div id="e-cor" class="err">Ingrese un correo válido.</div>
            </div>
            <button id="btn-go" class="btn-main" disabled>INICIAR EVALUACIÓN</button>
        </div>

        <div id="fase2" class="card hidden">
            <p id="step" style="text-align:center; color: var(--neon); font-weight:bold;"></p>
            <h2 id="q-text" style="text-align:center; font-size: 18px; margin: 20px 0;"></h2>
            <button class="btn-opt" onclick="ask(0)">SÍ, TODO EN ORDEN</button>
            <button class="btn-opt" onclick="ask(20)">NO / TENGO DUDAS</button>
            <button class="btn-opt" onclick="ask(20)">NO LO SÉ</button>
        </div>

        <div id="fase3" class="card hidden">
            <h1>Resultado del Análisis</h1>
            <div style="text-align:center; margin-bottom:15px;">
                Estatus: <span id="r-status" style="font-weight:bold; font-size:20px;"></span>
            </div>
            
            <div class="calc-display">
                <span style="font-size: 14px; color: var(--neon);">MULTA ESTIMADA (ILÍCITOS)</span>
                <span id="monto-bs" class="multa-monto">Bs. 0.00</span>
                <div class="ut-info">Basado en <span id="cant-ut">0</span> UT (Valor UT: Bs. 9.00)</div>
            </div>

            <p id="r-desc" style="font-size:14px; text-align:center; color:#cbd5e1; line-height:1.5;"></p>
            
            <a id="wa-link" href="#" class="btn-link btn-wa" target="_blank">SOLICITAR ASESORÍA URGENTE</a>
            <button onclick="location.reload()" style="background:transparent; color:#64748b; font-size:13px; text-decoration:underline;">Reiniciar y limpiar datos</button>
        </div>
    </div>

    <script>
        const qs = [
            "¿Lleva sus Libros de Compra y Venta al día según normativa?",
            "¿Emite facturas legales o usa máquina fiscal autorizada?",
            "¿Declara el IVA y el ISLR dentro de los plazos legales?",
            "¿Su Registro de Información Fiscal (RIF) está actualizado?",
            "¿Maneja pagos en divisas (IGTF) y los reporta correctamente?"
        ];

        let cur = 0, pts = 0;
        const UT_VALOR = 9.00; // Valor de la UT que estaba en tu código de WordPress

        // Validación de datos
        const fields = {
            n: document.getElementById('nombre'),
            r: document.getElementById('rif'),
            c: document.getElementById('correo')
        };

        function validate() {
            const vN = fields.n.value.length > 3;
            const vR = /^[VEJG]-?\d{7,9}-?\d$/.test(fields.r.value.trim().toUpperCase());
            const vC = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(fields.c.value);
            
            document.getElementById('e-nom').style.display = (fields.n.value && !vN) ? 'block' : 'none';
            document.getElementById('e-rif').style.display = (fields.r.value && !vR) ? 'block' : 'none';
            document.getElementById('e-cor').style.display = (fields.c.value && !vC) ? 'block' : 'none';
            
            document.getElementById('btn-go').disabled = !(vN && vR && vC);
        }

        Object.values(fields).forEach(f => f.addEventListener('input', validate));

        document.getElementById('btn-go').addEventListener('click', () => {
            document.getElementById('fase1').classList.replace('visible', 'hidden');
            document.getElementById('fase2').classList.replace('hidden', 'visible');
            showQ();
        });

        function showQ() {
            document.getElementById('step').innerText = `PREGUNTA ${cur + 1} DE 5`;
            document.getElementById('q-text').innerText = qs[cur];
        }

        function ask(p) {
            pts += p;
            cur++;
            if (cur < qs.length) showQ();
            else showFinal();
        }

        function showFinal() {
            document.getElementById('fase2').classList.replace('visible', 'hidden');
            document.getElementById('fase3').classList.replace('hidden', 'visible');
            
            let status = "BAJO", col = "#22c55e", uts = 50;
            let desc = "Su perfil presenta cumplimiento básico. Recomendamos auditoría preventiva.";

            if (pts >= 80) { 
                status = "CRÍTICO"; col = "#ef4444"; uts = 500;
                desc = "RIESGO DE CLAUSURA. Se detectaron ilícitos graves que generan multas severas según el COT.";
            } else if (pts >= 40) { 
                status = "MODERADO"; col = "#f59e0b"; uts = 150;
                desc = "Existen debilidades en su control tributario. Evite sanciones por deberes formales.";
            }

            // Aplicación de la lógica de tu calculadora
            const totalBs = uts * UT_VALOR;
            document.getElementById('r-status').innerText = status;
            document.getElementById('r-status').style.color = col;
            document.getElementById('monto-bs').innerText = `Bs. ${totalBs.toLocaleString('es-VE', {minimumFractionDigits: 2})}`;
            document.getElementById('cant-ut').innerText = uts;
            document.getElementById('r-desc').innerText = desc;

            // WhatsApp
            const as = ['584265112653', '584122089575'];
            const a = as[Math.floor(Math.random() * as.length)];
            const msj = `Hola! Soy ${fields.n.value}, RIF ${fields.r.value}. Mi diagnóstico dio RIESGO ${status} con una multa estimada de Bs. ${totalBs}. Necesito asesoría.`;
            document.getElementById('wa-link').href = `https://wa.me/${a}?text=${encodeURIComponent(msj)}`;
        }
    </script>
</body>
</html>
